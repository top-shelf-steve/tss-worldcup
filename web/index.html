<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup 2026</title>
  <meta name="description" content="A clean World Cup 2026 tracker — matches, groups, bracket, and Team USA." />
  <link rel="stylesheet" href="css/styles.css" />
  <!--WC_CONFIG--><!-- build_static.py injects the static data config here -->
</head>
<body>
  <header class="masthead">
    <a class="brand" href="#/" aria-label="World Cup 2026 — home">
      <svg class="brand__ball" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="10.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
        <path d="M12 6.2l3.7 2.7-1.4 4.3h-4.6L8.3 8.9 12 6.2z" fill="currentColor"/>
        <path d="M12 6.2V3M15.7 8.9l2.8-1.5M14.3 13.2l2.2 2.6M9.7 13.2l-2.2 2.6M8.3 8.9 5.5 7.4"
              fill="none" stroke="currentColor" stroke-width="1.1"/>
      </svg>
      <span class="brand__name">World Cup 2026</span>
    </a>

    <nav class="nav" id="nav">
      <a href="#/" data-route="overview">Overview</a>
      <a href="#/matches" data-route="matches">Matches</a>
      <a href="#/groups" data-route="groups">Groups</a>
      <a href="#/teams" data-route="teams">Teams</a>
      <a href="#/stats" data-route="stats">Stats</a>
      <a href="#/news" data-route="news">News</a>
    </nav>

    <div class="masthead__tools">
      <button class="icon-btn" id="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
      <button class="icon-btn icon-btn--menu" id="menu-toggle" type="button" aria-label="Menu" aria-expanded="false">
        <span></span><span></span>
      </button>
    </div>
  </header>

  <main id="app" class="app"><div class="loading">Loading…</div></main>

  <footer class="colophon">
    <span id="data-status">World Cup 2026 tracker</span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
